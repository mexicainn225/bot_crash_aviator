<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0e0e0e; color: white; text-align: center; margin: 0; padding: 20px; }
        .menu-view { display: block; }
        .signal-view { display: none; }
        
        .card { 
            background-size: cover;
            background-position: center;
            background-color: rgba(74, 0, 0, 0.85);
            background-blend-mode: overlay;
            padding: 20px; 
            border-radius: 15px; 
            margin: 20px auto; 
            border: 1px solid #770000;
            width: 90%;
            max-width: 350px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
        .cote-label { color: #aaaaaa; font-size: 14px; }
        .cote-val { font-size: 36px; color: #ffd700; font-weight: bold; margin: 5px 0; }
        .debut-text { color: #cccccc; font-size: 14px; margin-top: 10px; }
        .fiabilite-text { color: #ff4d6d; font-weight: bold; font-size: 14px; margin-top: 5px; }

        img { width: 100%; border-radius: 10px; cursor: pointer; margin-bottom: 20px; max-width: 300px; }
        button { width: 90%; max-width: 350px; padding: 15px; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; font-size: 15px; }
        .btn-signal { background: #00ffcc; color: black; } /* Bouton vert comme sur ton image */
        .btn-back { background: #e0e0e0; color: black; }
    </style>
</head>
<body>

    <div id="menuView" class="menu-view">
        <h1>SIGNAL🚀GAME✈️</h1>
        <div onclick="showSignal('CRASH', 'images/IMG_2400.jpeg')">
            <p>CRASH</p>
            <img src="images/IMG_2400.jpeg" alt="Crash">
        </div>
        <div onclick="showSignal('AVIATOR', 'images/IMG_2401.jpeg')">
            <p>AVIATOR</p>
            <img src="images/IMG_2401.jpeg" alt="Aviator">
        </div>
    </div>

    <div id="signalView" class="signal-view">
        <h2 id="gameTitle">Jeu</h2>
        <div class="card" id="cardBg">
            <div class="cote-label">Cote cible</div>
            <div class="cote-val" id="coteVal">0.00x</div>
            <div class="debut-text">Début: <span id="debutTime">00:00:50</span></div>
            <div class="fiabilite-text">Fiabilité: <span id="fiabiliteVal">2</span></div>
        </div>
        <button class="btn-signal" onclick="generateSignal()">DEMANDER SIGNAL</button>
        <button class="btn-back" onclick="hideSignal()">RETOUR</button>
    </div>

    <script>
        let currentGame = '';
        const serverUrl = "https://bot-crash-aviator.onrender.com"; 

        async function generateSignal() {
            if (!currentGame) return;

            // Effet visuel "Calcul..."
            const coteEl = document.getElementById('coteVal');
            coteEl.innerText = "Calcul...";
            coteEl.style.color = "#00ffcc"; 

            try {
                const response = await fetch(`${serverUrl}/get_signal/${currentGame}`);
                const data = await response.json();

                // Petite pause artificielle pour l'effet
                await new Promise(resolve => setTimeout(resolve, 1500));

                coteEl.style.color = "#ffd700";
                coteEl.innerText = data.cote + 'x';
                document.getElementById('fiabiliteVal').innerText = "2";
                
                const now = new Date();
                const timeString = now.getHours().toString().padStart(2, '0') + ":" + 
                                   data.minute.toString().padStart(2, '0') + ":50";
                
                document.getElementById('debutTime').innerText = timeString;
            } catch (error) {
                coteEl.innerText = "Erreur";
                coteEl.style.color = "red";
            }
        }

        function showSignal(game, imagePath) {
            currentGame = game;
            document.getElementById('gameTitle').innerText = game;
            document.getElementById('cardBg').style.backgroundImage = "url('" + imagePath + "')";
            document.getElementById('menuView').style.display = 'none';
            document.getElementById('signalView').style.display = 'block';
            generateSignal();
        }

        function hideSignal() {
            document.getElementById('menuView').style.display = 'block';
            document.getElementById('signalView').style.display = 'none';
        }

        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
